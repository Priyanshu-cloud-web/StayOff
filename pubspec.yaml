name: focusguard
description: Stay Off - Block distractions, reclaim your focus.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # HTTP / API
  dio: ^5.4.3
  jwt_decoder: ^2.0.1

  # UI
  local_auth: ^2.1.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0

  # Local notifications
  flutter_local_notifications: ^17.1.2

  # Android specific
  usage_stats: ^1.1.1
  installed_apps: ^1.4.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true